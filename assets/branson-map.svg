<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" role="img" aria-label="Stylized map of Branson, Missouri with location marker">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef8fb"/>
      <stop offset="100%" stop-color="#ecf6f8"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#0bb2b5"/>
      <stop offset="100%" stop-color="#017a86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feBlend in="SourceGraphic" in2="b"/>
    </filter>
  </defs>

  <!-- rounded canvas -->
  <rect x="14" y="14" rx="28" ry="28" width="872" height="532" fill="#f6fbfc"/>
  <g transform="translate(40,40)">
    <!-- subtle land shapes -->
    <g opacity="0.95">
      <rect width="820" height="480" rx="22" fill="url(#bg)" />
      <path d="M40 160c90-40 190-60 300-40s210 70 320 40v220H40z" fill="#e6f7ee"/>
      <path d="M60 320c90-30 180-10 260 10s190 40 310 10v110H60z" fill="#fffefb"/>
      <path d="M140 80c60 20 120 5 190 30s150 80 230 70" stroke="#d1eef1" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.9"/>
      <path d="M80 220c60-10 120 0 180 10s160 20 260 0" stroke="#cdeff3" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.9"/>
    </g>

    <!-- water body (lake) -->
    <ellipse cx="200" cy="120" rx="110" ry="60" fill="#e8f7ff" opacity="0.95"/>

    <!-- roads (stylized) -->
    <g stroke="#dbeff2" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95">
      <path d="M40 60 C160 80, 250 40, 360 70"/>
      <path d="M120 340 C220 300, 360 320, 480 290"/>
      <path d="M520 80 C600 110, 660 180, 700 260"/>
    </g>

    <!-- small neighborhood dots -->
    <g fill="#cdeff3" opacity="0.95">
      <circle cx="520" cy="300" r="6" />
      <circle cx="480" cy="340" r="5" />
      <circle cx="420" cy="260" r="4" />
      <circle cx="300" cy="200" r="5" />
      <circle cx="200" cy="360" r="4" />
    </g>

    <!-- subtle shadow under marker -->
    <ellipse cx="520" cy="310" rx="36" ry="14" fill="#017a86" opacity="0.12"/>

    <!-- marker pin (stylized) -->
    <g transform="translate(520,260)">
      <g filter="url(#soft)">
        <path d="M0 0 C20 0 34 16 34 36 C34 64 0 104 0 104 C0 104 -34 64 -34 36 C-34 16 -20 0 0 0 Z" fill="url(#pinGrad)" transform="translate(0,0) scale(0.6) translate(0,20)"/>
      </g>
      <circle cx="0" cy="36" r="14" fill="#ffffff" stroke="#e6fbfd" stroke-width="4" transform="scale(0.6) translate(0,20)"/>
    </g>

    <!-- caption in bottom-left of the map area -->
    <g transform="translate(12,404)">
      <rect width="260" height="48" rx="8" fill="#ffffff" opacity="0.95"/>
      <text x="18" y="30" font-family="Manrope, Arial, sans-serif" font-weight="700" font-size="14" fill="#03303a">Located in Branson, MO</text>
    </g>
  </g>
</svg>
